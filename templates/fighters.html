<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fighters</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='fighters.css') }}">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="card-body">
                <form id="add_fighter_form" action="/add_fighter" method="post">
                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="name" placeholder="Name" required><br>

                    <label for="nickname">Nickname:</label><br>
                    <input type="text" id="nickname" name="nickname" placeholder="Nickname"><br>

                    <label for="country">Country:</label><br>
                    <input type="text" id="country" name="country" placeholder="Country" required><br>

                    <label for="age">Age:</label><br>
                    <input type="number" id="age" name="age" placeholder="Age" min="18"><br>

                    <label for="weight_class">Weight Class:</label><br>
                    <input type="text" id="weight_class" name="weight_class" placeholder="Weight class" required><br>

                    <button type="submit" class="add-fighter-button">Add Fighter</button>
                </form>
            </div>
        </div>

        {% for fighter in fighters %}
        <div class="card">
            <div class="card-body">
                <form id="update_form_{{ fighter.FighterID }}" onsubmit="event.preventDefault(); handleFormSubmit('update_form_{{ fighter.FighterID }}');" method="post" action="/update_fighter/{{ fighter.FighterID }}">
                    <label for="name_{{ fighter.FighterID }}">Name:</label><br>
                    <input type="text" id="name_{{ fighter.FighterID }}" name="name" value="{{ fighter.Name }}" required><br>

                    <label for="nickname_{{ fighter.FighterID }}">Nickname:</label><br>
                    <input type="text" id="nickname_{{ fighter.FighterID }}" name="nickname" value="{{ fighter.Nickname }}"><br>

                    <label for="country_{{ fighter.FighterID }}">Country:</label><br>
                    <input type="text" id="country_{{ fighter.FighterID }}" name="country" value="{{ fighter.Country }}" required><br>

                    <label for="age_{{ fighter.FighterID }}">Age:</label><br>
                    <input type="number" id="age_{{ fighter.FighterID }}" name="age" value="{{ fighter.Age }}" min="18"><br>

                    <label for="weight_class_{{ fighter.FighterID }}">Weight Class:</label><br>
                    <input type="text" id="weight_class_{{ fighter.FighterID }}" name="weight_class" value="{{ fighter.WeightClass }}" required><br>

                    <button type="submit" class="update-button">Update</button>
                </form>
                <form id="delete_form_{{ fighter.FighterID }}" onsubmit="event.preventDefault(); handleDeleteFormSubmit('{{ fighter.FighterID }}');" action="/delete_fighter/{{ fighter.FighterID }}" method="post">
                    <button type="submit" class="delete-button">Delete</button>
                </form>
            </div>
        </div>
        {% endfor %}
    </div>
    <!-- Notification -->
    <div id="notification" class="notification"></div>

    <script>document.getElementById('add_fighter_form').addEventListener('submit', function(event) {
    event.preventDefault();
    var form = event.target;
    var formData = new FormData(form);

    fetch(form.action, {
        method: form.method,
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.message) {
            showNotification(data.message);
            setTimeout(function() {
                hideNotification();
                window.location.href = '/fighters';
            }, 5000);
        } else if (data.error) {
            alert(data.error);
        }
    })
    .catch(error => {
        console.error('Error:', error);
    });
});

function handleFormSubmit(formID) {
    var form = document.getElementById(formID);
    var formData = new FormData(form);

    fetch(form.action, {
        method: form.method,
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.message) {
            showNotification(data.message);
            setTimeout(function() {
                hideNotification();
                window.location.href = '/fighters';
            }, 5000);
        } else if (data.error) {
            alert(data.error);
        }
    })
    .catch(error => {
        console.error('Error:', error);
    });
}

function handleDeleteFormSubmit(fighterID) {
    if (confirm("Are you sure you want to delete this fighter?")) {
        var form = document.getElementById('delete_form_' + fighterID);
        var formData = new FormData(form);

        fetch(form.action, {
            method: form.method,
            body: formData
        })
        .then(response => response.json())
        .then(data => {
            if (data.message) {
                showNotification(data.message);
                setTimeout(function() {
                    hideNotification();
                    window.location.href = '/fighters';
                }, 5000);
            } else if (data.error) {
                alert(data.error);
            }
        })
        .catch(error => {
            console.error('Error:', error);
        });
    }
}

        function showNotification(message) {
            var notification = document.getElementById('notification');
            notification.innerText = message;
            notification.style.display = 'block'; // Show the notification
        }

        function hideNotification() {
            var notification = document.getElementById('notification');
            notification.style.display = 'none'; // Hide the notification
        }
    </script>
</body>
</html>
